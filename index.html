<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1">

<title>Amurusu Residence - Gestione Sdraio</title>

<link
    rel="stylesheet"
    href="css/style.css?v=20260721-1">

</head>

<body class="non-autenticato">

<header>

    <div class="logo">

        <img
            src="img/logo.png"
            alt="Logo">

        <div>

            <h1>Amurusu Residence</h1>

            <p>Gestione Sdraio</p>

        </div>

    </div>

    <div class="azioni">

        <div class="navigazione-data" aria-label="Navigazione data">

            <button id="btnDataPrecedente" type="button" aria-label="Giorno precedente">‹</button>

            <input
                type="date"
                id="data">

            <button id="btnOggi" type="button">Oggi</button>

            <button id="btnDataSuccessiva" type="button" aria-label="Giorno successivo">›</button>

        </div>

        <div id="barraStato">

            <label class="check">

                <input
                    type="checkbox"
                    id="chkTariffaAuto"
                    checked>

                Tariffa automatica

            </label>

            <span id="libere">

                🟢 Libere: 40

            </span>

            <span id="occupate">

                🔴 Occupate: 0

            </span>

        </div>

        <button id="btnPrenota">

            ➕ Prenotazione

        </button>

        <button id="btnStatistiche" type="button">

            📊 Statistiche

        </button>

        <button id="btnTariffe" type="button">

            ⚙️ Tariffe

        </button>

        <button id="btnIncassi" type="button">

            💶 Incassi

            <span id="badgeIncassi" class="badge-incassi hidden" aria-label="Prenotazioni da saldare"></span>

        </button>

        <button id="btnManuale" type="button">

            Manuale

        </button>

        <a id="btnEsci" class="link-esci" href="logout.html" onclick="return esciDopoSalvataggio(event)">

            Esci

        </a>

    </div>

    <button id="btnMenuMobile" class="btn-menu-mobile" type="button" aria-label="Apri menu" aria-expanded="false">☰</button>

</header>

<div id="menuMobile" class="menu-mobile hidden">
    <button id="btnStatisticheMobile" type="button">📊 Statistiche</button>
    <button id="btnTariffeMobile" type="button">⚙️ Tariffe</button>
    <button id="btnManualeMobile" type="button">Manuale</button>
    <a id="btnEsciMobile" class="link-esci" href="logout.html" onclick="return esciDopoSalvataggio(event)">Esci</a>
</div>

<main>

    <div class="azioni-rapide-mobile" aria-label="Azioni rapide">
        <button id="btnPrenotaMobile" type="button">＋ Prenotazione</button>
        <button id="btnIncassiMobile" type="button">💶 Incassi <span id="badgeIncassiMobile" class="badge-incassi hidden"></span></button>
    </div>

    <div id="mappaViewport">

        <div id="mappa">

            <img
                id="planimetria"
                src="img/planimetria.svg"
                alt="Planimetria"
                loading="eager"
                draggable="false">

            <div
                id="layerSdraie"
                aria-hidden="true">

            </div>

        </div>

    </div>

    <div class="controlli-mappa" aria-label="Zoom planimetria">
        <button id="btnZoomMeno" type="button" aria-label="Riduci zoom">−</button>
        <button id="btnZoomReset" type="button">100%</button>
        <button id="btnZoomPiu" type="button" aria-label="Aumenta zoom">+</button>
    </div>

</main>

<footer
    id="scheda"
    class="scheda">

    Tocca una sdraia...

</footer>

<!-- ==========================================================
     ACCESSO
=========================================================== -->

<div id="modalAccesso" class="modal" role="dialog" aria-modal="true">

    <div class="modal-box modal-accesso">

        <h2>Accesso Gestione Sdraio</h2>

        <label for="txtEmailAccesso">Email</label>
        <input id="txtEmailAccesso" type="email" autocomplete="username" placeholder="Email amministratore o piscina">

        <label for="txtPasswordAccesso">Password</label>
        <input id="txtPasswordAccesso" type="password" autocomplete="current-password" placeholder="Password">

        <p id="erroreAccesso" class="errore"></p>

        <button id="btnAccedi" type="button" class="btn-accesso">Accedi</button>

        <button id="btnUsaAccessoPiscina" type="button" class="btn-link">Usa accesso piscina</button>

    </div>

</div>

<!-- ==========================================================
     MODAL PRENOTAZIONE
=========================================================== -->

<div
    id="modalPrenotazione"
    class="modal hidden"
    role="dialog"
    aria-modal="true">

    <div class="modal-box">

        <div class="modal-header">

            <h2>🏖 Nuova Prenotazione</h2>

            <button
                id="btnChiudiModal"
                type="button"
                class="btn-close">

                &times;

            </button>

        </div>

        <label for="txtCognome">

            Cognome

        </label>

        <input
            id="txtCognome"
            type="text"
            placeholder="Es. Rossi"
            autocomplete="family-name"
            autocapitalize="words"
            enterkeyhint="next">

        <div
            id="errCognome"
            class="errore">

        </div>

        <label for="txtTelefono">

            Telefono

        </label>

        <div class="telefono-conferma">
            <input
                id="txtTelefono"
                type="tel"
                inputmode="tel"
                autocomplete="tel"
                enterkeyhint="done"
                placeholder="Es. +39 333 1234567">
            <button id="btnConfermaTelefono" type="button">OK</button>
        </div>

        <div
            id="errTelefono"
            class="errore">

        </div>

        <label for="txtNote">

            Note

        </label>

        <textarea
            id="txtNote"
            rows="2"
            maxlength="200"
            placeholder="Es. Arrivo nel pomeriggio"></textarea>

        <div class="riga">

            <div class="campo">

                <label for="txtNumero">

                    Sdraie

                </label>

                <div class="number-stepper" aria-label="Numero sdraie">
                    <button id="btnNumeroMeno" type="button" aria-label="Diminuisci sdraie">-</button>
                    <input
                        id="txtNumero"
                        type="number"
                        value="2"
                        min="1"
                        max="25"
                        inputmode="numeric">
                    <button id="btnNumeroPiu" type="button" aria-label="Aumenta sdraie">+</button>
                </div>

                <div
                    id="errNumero"
                    class="errore">

                </div>

            </div>

            <div class="campo">

                <label for="txtData">

                    Data

                </label>

                <input
                    id="txtData"
                    type="date">

            </div>

        </div>

        <label class="check">

            <input
                type="checkbox"
                id="chkTariffaAutoModal"
                checked>

            Tariffa automatica

        </label>

        <div class="riga">

            <div class="campo">

                <label for="txtPrezzo">

                    Prezzo (€)

                </label>

                <input
                    id="txtPrezzo"
                    class="no-spin"
                    type="number"
                    min="0"
                    step="0.01"
                    value="10"
                    inputmode="decimal"
                    autocomplete="off">

            </div>

            <div class="campo">

                <label for="txtTotale">

                    Totale (€)

                </label>

                <input
                    id="txtTotale"
                    type="number"
                    readonly
                    tabindex="-1"
                    autocomplete="off">

            </div>

        </div>

        <div class="riga">

            <div class="campo">

                <label for="txtAcconto">

                    Acconto (€)

                </label>

                <input
                    id="txtAcconto"
                    type="text"
                    value="0"
                    inputmode="decimal"
                    autocomplete="off">

            </div>

            <div class="campo">

                <label for="txtSaldo">

                    Da saldare

                </label>

                <input
                    id="txtSaldo"
                    type="text"
                    readonly
                    tabindex="-1"
                    autocomplete="off">

            </div>

        </div>

        <div class="modal-buttons">

            <button
                id="btnAnnulla"
                type="button">

                Annulla

            </button>

            <button
                id="btnSalva"
                type="button">

                Salva

            </button>

        </div>

    </div>

</div>

<!-- ==========================================================
     MODAL INCASSI
=========================================================== -->

<div id="modalIncassi" class="modal hidden" role="dialog" aria-modal="true">

    <div class="modal-box modal-incassi">

        <div class="modal-header">
            <h2>💶 Incassi</h2>
            <button id="btnChiudiIncassi" type="button" class="btn-close">&times;</button>
        </div>

        <input id="txtCercaIncassi" type="search" placeholder="Cerca cliente, telefono o sdraia" autocomplete="off">

        <select id="cmbFiltroIncassi" aria-label="Filtro incassi">
            <option value="da_saldare">Da saldare</option>
            <option value="tutte">Tutte le prenotazioni</option>
            <option value="saldate">Saldate</option>
        </select>

        <div id="listaIncassi" class="lista-incassi"></div>

    </div>

</div>

<!-- ==========================================================
     MODAL TARIFFE
=========================================================== -->

<div id="modalTariffe" class="modal hidden" role="dialog" aria-modal="true">

    <div class="modal-box modal-tariffe">

        <div class="modal-header">
            <h2>⚙️ Tariffe</h2>
            <button id="btnChiudiTariffe" type="button" class="btn-close">&times;</button>
        </div>

        <label for="txtTariffaStandard">Prezzo standard giornaliero (€)</label>
        <input id="txtTariffaStandard" type="number" min="0" step="0.01" inputmode="decimal">

        <div class="riga">
            <div class="campo">
                <label for="txtTariffaSabato">Tutti i sabati (€)</label>
                <input id="txtTariffaSabato" type="number" min="0" step="0.01" inputmode="decimal">
            </div>
            <div class="campo">
                <label for="txtTariffaDomenica">Tutte le domeniche (€)</label>
                <input id="txtTariffaDomenica" type="number" min="0" step="0.01" inputmode="decimal">
            </div>
        </div>

        <div class="tariffe-speciali">
            <strong>Date con tariffa speciale</strong>
            <div class="riga">
                <div class="campo">
                    <label for="txtDataSpeciale">Data</label>
                    <input id="txtDataSpeciale" type="date">
                </div>
                <div class="campo">
                    <label for="txtPrezzoSpeciale">Prezzo (€)</label>
                    <input id="txtPrezzoSpeciale" type="number" min="0" step="0.01" inputmode="decimal">
                </div>
            </div>
            <button id="btnAggiungiTariffaSpeciale" type="button" class="btn-secondario">Aggiungi data speciale</button>
            <div id="listaDateSpeciali" class="lista-tariffe-speciali"></div>
        </div>

        <div class="modal-buttons">
            <button id="btnAnnullaTariffe" type="button">Annulla</button>
            <button id="btnSalvaTariffe" type="button">Salva tariffe</button>
        </div>

    </div>

</div>

<!-- ==========================================================
     MODAL PAGAMENTO
=========================================================== -->

<div
    id="modalPagamento"
    class="modal hidden"
    role="dialog"
    aria-modal="true">

    <div class="modal-box">

        <div class="modal-header">

            <h2>💶 Registra pagamento</h2>

            <button
                id="btnChiudiPagamento"
                type="button"
                class="btn-close">

                &times;

            </button>

        </div>

        <label for="txtImportoPagamento">

            Importo (€)

        </label>

        <input
            id="txtImportoPagamento"
            type="number"
            min="0"
            step="0.01"
            value="0"
            autocomplete="off">

        <label for="cmbMetodoPagamento">

            Metodo di pagamento

        </label>

        <select id="cmbMetodoPagamento">
            <option value="SumUp">SumUp</option>
            <option value="Contanti">Contanti</option>
        </select>

        <label for="cmbOperatorePagamento">

            Operatore

        </label>

        <select id="cmbOperatorePagamento">
            <option value="">Seleziona operatore</option>
            <option value="Debhora">Debhora</option>
            <option value="Daniele">Daniele</option>
            <option value="Giuseppe">Giuseppe</option>
        </select>

        <div class="modal-buttons">

            <button
                id="btnAnnullaPagamento"
                type="button">

                Annulla

            </button>

            <button
                id="btnSalvaPagamento"
                type="button">

                Salva

            </button>

        </div>

    </div>

</div>

<!-- ==========================================================
     JAVASCRIPT
=========================================================== -->

<!-- Stato applicazione -->

<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.16.0/firebase-functions-compat.js"></script>

<script src="js/firebase-config.js"></script>

<script src="js/firebase.js?v=20260721-11"></script>

<script src="js/stato.js"></script>

<!-- Riferimenti DOM -->

<script src="js/dom.js"></script>

<!-- Utility -->

<script src="js/utils.js"></script>

<!-- Layout spiaggia -->

<script src="js/layout.js"></script>

<!-- Modello prenotazione -->

<script src="js/prenotazione.js"></script>

<!-- Gestione mappa sdraie -->

<script src="js/sdraie.js"></script>

<!-- Archivio prenotazioni -->

<script src="js/prenotazioni.js?v=20260721-3"></script>

<!-- Pagamenti -->

<script src="js/pagamenti.js"></script>

<!-- Incassi -->

<script src="js/incassi.js"></script>

<!-- Statistiche -->

<script src="js/statistiche.js"></script>

<!-- Modalità modifica -->

<script src="js/modifica.js"></script>

<!-- Scheda prenotazione -->

<script src="js/scheda.js"></script>

<!-- Bootstrap applicazione -->

<script src="js/app.js"></script>

</body>

</html>
